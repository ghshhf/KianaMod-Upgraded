name: Build & Verify

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew download-deps.sh

      - name: Download modding dependencies
        run: ./download-deps.sh

      - name: Compile with --release 8
        run: ./gradlew compileJava

      - name: Verify Java 8 bytecode compatibility
        run: ./gradlew verifyJava8

      - name: Upload compiled classes as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiana-mod-classes
          path: build/classes/java/main/
